<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Учим Python</title>
    <style>
        /* Светло-синий версия 1 */
        body { 
            font-family: sans-serif; 
            background: linear-gradient(135deg, #e0f2fe 0%, #bae6fd 100%); 
            color: #1e3a8a;
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
        }
        .card { 
            background: #ffffff; 
            padding: 40px; 
            border-radius: 25px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.1); 
            text-align: center;
            width: 100%;
            max-width: 400px;
        }
        h1 { color: #0369a1; font-size: 28px; margin-bottom: 20px; }
        input { 
            width: 100%; 
            padding: 12px; 
            margin-bottom: 20px; 
            border: 2px solid #bae6fd; 
            border-radius: 10px; 
            box-sizing: border-box;
            font-size: 16px;
        }
        button { 
            width: 100%; 
            padding: 12px; 
            background-color: #0ea5e9; 
            color: white; 
            border: none; 
            border-radius: 10px; 
            cursor: pointer; 
            font-size: 16px; 
            font-weight: bold;
        }
        button:hover { background-color: #0284c7; }
    </style>
</head>
<body>
    <div class="card">
        {% if done %}
            <h1> Поздравляем!</h1>
            <p>Вы выучили все слова в этом словаре.</p>
            <!-- Ссылка на сброс прогресса -->
            <a href="/reset" style="text-decoration: none;">
                <button type="button">Начать заново</button>
            </a>
        <!-- Иначе (если слова еще есть) показываем обычную форму -->
        {% else %}
        <h1>Как переводится: <br> <span style="color: #0ea5e9;">{{ word }}</span>?</h1>
        <form action="/check" method="post">
            <input type="hidden" name="word" value="{{ word }}">
            <input type="text" name="answer" placeholder="Введите перевод" required autofocus>
            <button type="submit">Проверить</button>
        </form>
        {% endif %}
    </div>
</body>
</html>
