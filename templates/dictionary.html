<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Словарь</title>
    <style>
        body { font-family: sans-serif; background: #f0f9ff; display: flex; justify-content: center; padding: 20px; }
        .container { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); width: 100%; max-width: 500px; }
        h1 { color: #0369a1; text-align: center; }
        table { width: 100%; border-collapse: collapse; margin-bottom: 20px; }
        th, td { border-bottom: 1px solid #e2e8f0; padding: 10px; text-align: left; }
        .add-form input { width: 100%; padding: 10px; margin-bottom: 10px; border: 1px solid #bae6fd; border-radius: 8px; box-sizing: border-box; }
        .btn { display: block; width: 100%; padding: 10px; background: #0ea5e9; color: white; border: none; border-radius: 8px; cursor: pointer; text-align: center; text-decoration: none; font-weight: bold; }
        .btn-back { background: #64748b; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Мои слова</h1>
        
        <table>
            <tr><th>En</th><th>Ru</th><th>Инфо</th></tr>
            {% for eng, data in words.items() %}
            <tr>
                <td><b>{{ eng }}</b></td>
                <td>{{ data[0] }}</td>
                <td style="font-size: 0.8em; color: gray;">{{ data[1] }}</td>
            </tr>
            {% endfor %}
        </table>

        <h3>Добавить новое:</h3>
        <form action="/add_word" method="post" class="add-form">
            <input type="text" name="eng" placeholder="Слово на английском" required>
            <input type="text" name="rus" placeholder="Перевод на русский" required>
            <input type="text" name="info" placeholder="Описание/Пример" required>
            <button type="submit" class="btn">Добавить в базу</button>
        </form>

        <a href="/" class="btn btn-back">Вернуться к тренировке</a>
    </div>
</body>
</html>
