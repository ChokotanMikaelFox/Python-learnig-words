<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Результат — Учим Python</title>
    <style>
        body { 
            font-family: sans-serif; 
            background: linear-gradient(135deg, #e0f2fe 0%, #bae6fd 100%); 
            color: #1e3a8a;
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
        }
        .card { 
            background: #ffffff; 
            padding: 40px; 
            border-radius: 25px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.1); 
            text-align: center;
            width: 100%;
            max-width: 400px;
            /* Базовая анимация появления */
            animation: fadeIn 0.3s ease-in;
        }

        /* Тряска */
        .shake { animation: shakeAnim 0.4s ease-in-out; }
        @keyframes shakeAnim {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }

        /* Пульсация */
        .pulse { animation: pulseAnim 0.4s ease-out; }
        @keyframes pulseAnim {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }
        h1 { font-size: 32px; margin-bottom: 10px; }
        .streak { 
            font-size: 20px; 
            margin-bottom: 20px; 
            color: #475569;
        }
        .info-box {
            background: #f8fafc;
            border-radius: 15px;
            padding: 15px;
            margin-bottom: 25px;
            border: 1px dashed #cbd5e1;
            color: #334155;
        }
        .btn { 
            display: inline-block;
            width: 100%; 
            padding: 14px; 
            background-color: #0ea5e9; 
            color: white; 
            border: none; 
            border-radius: 12px; 
            cursor: pointer; 
            font-size: 16px; 
            font-weight: bold;
            text-decoration: none;
            box-sizing: border-box;
        }
        .btn:hover { background-color: #0284c7; }
    </style>
</head>
<body>
    <!-- Анимация в зависимости от результата -->
    <div class="card {% if color == 'green' %}pulse{% else %}shake{% endif %}">
        
        <h1 style="color: {{ color }};">{{ result }}</h1>
        
        <div class="streak">
            Серия: <span style="color: #f97316;">🔥 {{ streak }}</span>
        </div>

        <div class="info-box">
            <strong>Описание:</strong><br>
            {{ info }}
        </div>

        <a href="/" class="btn" id="next-btn">Следующее слово</a>
    </div>

    <!-- ENTER -->
    <script>
        document.addEventListener('keydown', function(event) {
            if (event.key === 'Enter') {
                document.getElementById('next-btn').click();
            }
        });
    </script>
</body>
</html>
